<style>
    body { font-family: 'Work Sans', sans-serif; background-color: #f9f9ff; color: #191c22; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Epilogue', sans-serif; }

    .neobrutalist-card {
        border: 3px solid black;
        box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        transition: all 0.1s ease;
        background-color: white;
        border-radius: 0px;
    }
    .neobrutalist-card:active {
        box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        transform: translate(8px, 8px);
    }
    .neobrutalist-btn {
        border: 4px solid black;
        box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        transition: all 0.1s ease;
        background-color: #196ad4;
        color: white;
        font-family: 'Epilogue', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 0px;
    }
    .neobrutalist-btn:active {
        box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
        transform: translate(4px, 4px);
    }
    .sketch-border {
        border: 3px solid black;
        position: relative;
    }
    .sketch-border::after {
        content: '';
        position: absolute;
        top: -2px; left: -2px; right: -2px; bottom: -2px;
        border: 1px solid black;
        pointer-events: none;
        opacity: 0.2;
    }
    .floating-voice {
        position: fixed;
        bottom: 32px;
        right: 32px;
        z-index: 100;
    }
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); z-index: 1000;
        display: none; justify-content: center; align-items: center;
    }
    .modal-content {
        border: 4px solid black;
        box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        background: white;
        border-radius: 0;
        padding: 2rem;

        width: 100%;
        position: relative;
    }
    .modal-close {
        position: absolute; right: 1rem; top: 1rem; font-size: 1.5rem; cursor: pointer;
    }
</style>

<a class="font-['Epilogue'] font-black uppercase tracking-tighter text-black hover:bg-[#196ad4] hover:text-white transition-all duration-75 active:translate-x-1 active:translate-y-1" href="/canvas">Goals Canvas</a>
<a class="font-['Epilogue'] font-black uppercase tracking-tighter text-black hover:bg-[#196ad4] hover:text-white transition-all duration-75 active:translate-x-1 active:translate-y-1" href="/twin">Financial Twin</a>

<img alt="Mascot Profile" src="./cowIcons/peekingCow.png" class="w-10 h-10 border-2 border-black object-cover" />

</header>

    <main class="max-w-7xl mx-auto px-4 pt-12 pb-12">
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
            <img src="./cowIcons/ReachingGoalsCow.png" class="w-20 h-20 object-contain" />
            <div>
                <h1 class="text-headline-xl font-headline-xl">Goal Canvas</h1>
                <p class="text-body-lg">Visually map your financial journey. Drag nodes, or ask AI to rebalance your timeline.</p>
            </div>
        </div>
        
        <div class="prompt-bar">
            <input type="text" id="ai-prompt" placeholder="e.g. 'I want to buy a house in 5 years'">
            <button class="neobrutalist-btn px-4 py-2" onclick="generateNodesFromPrompt()">Generate Path</button>
        </div>

        <div class="neobrutalist-card canvas-container" id="canvas-area">
            <svg class="connections" id="svg-layer"></svg>
            <!-- Nodes will be appended here -->
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        const canvas = document.getElementById('canvas-area');
        const svgLayer = document.getElementById('svg-layer');
        let nodesData = [];
        let edgesData = [];
        let isDragging = false;
        let dragNode = null;
        let offsetX, offsetY;

        function renderCanvas() {
            // Clear existing
            Array.from(canvas.querySelectorAll('.node')).forEach(n => n.remove());
            svgLayer.innerHTML = '';

            // Draw Edges
            edgesData.forEach(edge => {
                const source = nodesData.find(n => n.id === edge.source);
                const target = nodesData.find(n => n.id === edge.target);
                if (source && target) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', source.x + 75);
                    line.setAttribute('y1', source.y + 25);
                    line.setAttribute('x2', target.x + 75);
                    line.setAttribute('y2', target.y + 25);
                    line.setAttribute('stroke', '#cbd5e1');
                    line.setAttribute('stroke-width', '3');
                    svgLayer.appendChild(line);
                }
            });

            // Draw Nodes
            nodesData.forEach(node => {
                const div = document.createElement('div');
                div.className = 'node';
                div.id = node.id;
                div.innerText = node.text;
                div.style.left = node.x + 'px';
                div.style.top = node.y + 'px';
                
                div.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    dragNode = node;
                    offsetX = e.clientX - node.x;
                    offsetY = e.clientY - node.y;
                });
                
                div.addEventListener('click', () => {
                    if (!isDragging) {
                        const editPrompt = prompt(`Edit node: "${node.text}" with AI:`, `What if I want to...`);
                        if (editPrompt) alert('AI Edit requested: ' + editPrompt + '\\n(Mock implemented for demo)');
                    }
                });
                
                canvas.appendChild(div);
            });
        }

        document.addEventListener('mousemove', (e) => {
            if (isDragging && dragNode) {
                const rect = canvas.getBoundingClientRect();
                let newX = e.clientX - offsetX;
                let newY = e.clientY - offsetY;
                // Boundaries
                newX = Math.max(0, Math.min(newX, rect.width - 150));
                newY = Math.max(0, Math.min(newY, rect.height - 50));
                
                dragNode.x = newX;
                dragNode.y = newY;
                renderCanvas();
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                setTimeout(() => isDragging = false, 50); // slight delay to prevent click fire
                dragNode = null;
            }
        });

        async function generateNodesFromPrompt() {
            const promptStr = document.getElementById('ai-prompt').value;
            if (!promptStr) return;
            
            try {
                const res = await fetch('/api/canvas/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptStr })
                });
                const data = await res.json();
                nodesData = data.nodes;
                edgesData = data.edges;
                renderCanvas();
            } catch(e) {
                console.error("Error generating nodes");
            }
        }
    </script>
