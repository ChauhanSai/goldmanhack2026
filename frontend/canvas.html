<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals Canvas | Aura Finance</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .canvas-container {
            position: relative;
            width: 100%;
            height: 600px;
            background: #ffffff;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 1rem;
        }
        svg.connections {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .node {
            position: absolute;
            width: 150px;
            background: var(--brand-blue);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: grab;
            z-index: 2;
            text-align: center;
            font-weight: 500;
            user-select: none;
        }
        .node:active { cursor: grabbing; }
        .prompt-bar {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .prompt-bar input { margin: 0; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Aura Finance</div>
        <div class="links">
            <a href="/dashboard">Portfolio</a>
            <a href="/canvas" class="active">Goals Canvas</a>
            <a href="/twin">Financial Twin</a>
            <a href="/" style="margin-left: 2rem; color: #ef4444;">Logout</a>
        </div>
    </nav>

    <main>
        <h1>Goal Canvas</h1>
        <p>Visually map your financial journey. Drag nodes, or ask AI to rebalance your timeline.</p>
        
        <div class="prompt-bar">
            <input type="text" id="ai-prompt" placeholder="e.g. 'I want to buy a house in 5 years'">
            <button class="btn" onclick="generateNodesFromPrompt()">Generate Path</button>
        </div>

        <div class="canvas-container" id="canvas-area">
            <svg class="connections" id="svg-layer"></svg>
            <!-- Nodes will be appended here -->
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
        const canvas = document.getElementById('canvas-area');
        const svgLayer = document.getElementById('svg-layer');
        let nodesData = [];
        let edgesData = [];
        let isDragging = false;
        let dragNode = null;
        let offsetX, offsetY;

        function renderCanvas() {
            // Clear existing
            Array.from(canvas.querySelectorAll('.node')).forEach(n => n.remove());
            svgLayer.innerHTML = '';

            // Draw Edges
            edgesData.forEach(edge => {
                const source = nodesData.find(n => n.id === edge.source);
                const target = nodesData.find(n => n.id === edge.target);
                if (source && target) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', source.x + 75);
                    line.setAttribute('y1', source.y + 25);
                    line.setAttribute('x2', target.x + 75);
                    line.setAttribute('y2', target.y + 25);
                    line.setAttribute('stroke', '#cbd5e1');
                    line.setAttribute('stroke-width', '3');
                    svgLayer.appendChild(line);
                }
            });

            // Draw Nodes
            nodesData.forEach(node => {
                const div = document.createElement('div');
                div.className = 'node';
                div.id = node.id;
                div.innerText = node.text;
                div.style.left = node.x + 'px';
                div.style.top = node.y + 'px';
                
                div.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    dragNode = node;
                    offsetX = e.clientX - node.x;
                    offsetY = e.clientY - node.y;
                });
                
                div.addEventListener('click', () => {
                    if (!isDragging) {
                        const editPrompt = prompt(`Edit node: "${node.text}" with AI:`, `What if I want to...`);
                        if (editPrompt) alert('AI Edit requested: ' + editPrompt + '\\n(Mock implemented for demo)');
                    }
                });
                
                canvas.appendChild(div);
            });
        }

        document.addEventListener('mousemove', (e) => {
            if (isDragging && dragNode) {
                const rect = canvas.getBoundingClientRect();
                let newX = e.clientX - offsetX;
                let newY = e.clientY - offsetY;
                // Boundaries
                newX = Math.max(0, Math.min(newX, rect.width - 150));
                newY = Math.max(0, Math.min(newY, rect.height - 50));
                
                dragNode.x = newX;
                dragNode.y = newY;
                renderCanvas();
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                setTimeout(() => isDragging = false, 50); // slight delay to prevent click fire
                dragNode = null;
            }
        });

        async function generateNodesFromPrompt() {
            const promptStr = document.getElementById('ai-prompt').value;
            if (!promptStr) return;
            
            try {
                const res = await fetch('/api/canvas/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptStr })
                });
                const data = await res.json();
                nodesData = data.nodes;
                edgesData = data.edges;
                renderCanvas();
            } catch(e) {
                console.error("Error generating nodes");
            }
        }
    </script>
</body>
</html>
